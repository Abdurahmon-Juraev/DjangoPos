<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        .register-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Input chetdan chiqib ketmasligi uchun */
        }
        .register-btn {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .register-btn:hover {
            background-color: #218838;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .login-link a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Ro'yxatdan o'tish</h2>
    <form action="/submit-registration" method="POST">
        <div class="form-group">
            <label for="username">Foydalanuvchi nomi</label>
            <input type="text" id="username" name="username" placeholder="Masalan: ali_01" required>
        </div>

        <div class="form-group">
            <label for="email">Email manzil</label>
            <input type="email" id="email" name="email" placeholder="misol@mail.com" required>
        </div>

        <div class="form-group">
            <label for="password">Parol</label>
            <input type="password" id="password" name="password" placeholder="********" required>
        </div>

        <div class="form-group">
            <label for="confirm-password">Parolni tasdiqlang</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>
        </div>

        <button type="submit" class="register-btn">Ro'yxatdan o'tish</button>
    </form>

    <div class="login-link">
        Akkauntingiz bormi? <a href="#">Kirish</a>
    </div>
</div>

</body>
</html>
