<!DOCTYPE html>
<html lang="uz">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background-color: #0d6efd; border: none; width: 100%; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="text-center mb-4">Tizimga kirish</h2>

    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="alert alert-danger">
                {% for error in form.non_field_errors %}
                    {{ error }}
                {% endfor %}
            </div>
        {% endif %}

        <div class="mb-3">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn btn-primary">Kirish</button>

        <div class="text-center mt-3">
            <small class="text-muted">Parolni unutdingizmi? <a href="#">Tiklash</a></small>
        </div>
    </form>
</div>

</body>
</html>
